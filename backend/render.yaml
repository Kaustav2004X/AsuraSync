# render.yaml — place in backend/ folder
# Render will auto-detect this and configure the service

services:
  - type: web
    name: asurasync-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.11.0
